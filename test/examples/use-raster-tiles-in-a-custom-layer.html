<!DOCTYPE html>
<html lang="en">
<head>
    <title>Use raster tiles in a custom layer</title>
    <meta property="og:description" content="Access raster tile textures from a custom layer." />
    <meta property="og:category" content="Raster & Imagery" />
    <meta property="og:created" content="2026-07-13" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../../dist/maplibre-gl.css" />

    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script type="module">
    import * as maplibregl from '../../dist/maplibre-gl-dev.mjs';

    const EXTENT = 8192;

    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'raster-tiles': {
                    type: 'raster',
                    tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                    tileSize: 256,
                    attribution: '© OpenStreetMap contributors'
                }
            },
            layers: [{
                id: 'background',
                type: 'background',
                paint: {'background-color': '#d8f2ff'}
            }]
        },
        center: [7.5, 48],
        zoom: 4
    });

    const rasterLayer = {
        id: 'custom-raster',
        type: 'custom',
        source: 'raster-tiles',

        onAdd(_map, gl) {
            const vertexShader = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vertexShader, `#version 300 es
                uniform mat4 u_matrix;
                in vec2 a_position;
                in vec2 a_texture_position;
                out vec2 v_texture_position;

                void main() {
                    gl_Position = u_matrix * vec4(a_position, 0.0, 1.0);
                    v_texture_position = a_texture_position;
                }
            `);
            gl.compileShader(vertexShader);

            const fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fragmentShader, `#version 300 es
                precision highp float;
                uniform sampler2D u_image;
                in vec2 v_texture_position;
                out vec4 fragColor;

                void main() {
                    vec4 color = texture(u_image, v_texture_position);
                    float luminance = dot(color.rgb, vec3(0.2126, 0.7152, 0.0722));
                    vec3 shadows = vec3(0.04, 0.12, 0.28);
                    vec3 highlights = vec3(1.0, 0.78, 0.34);
                    vec3 duotone = mix(shadows, highlights, smoothstep(0.15, 0.9, luminance));
                    fragColor = vec4(duotone, color.a);
                }
            `);
            gl.compileShader(fragmentShader);

            this.program = gl.createProgram();
            gl.attachShader(this.program, vertexShader);
            gl.attachShader(this.program, fragmentShader);
            gl.linkProgram(this.program);
            gl.deleteShader(vertexShader);
            gl.deleteShader(fragmentShader);

            this.matrixLocation = gl.getUniformLocation(this.program, 'u_matrix');
            this.imageLocation = gl.getUniformLocation(this.program, 'u_image');
            this.positionLocation = gl.getAttribLocation(this.program, 'a_position');
            this.texturePositionLocation = gl.getAttribLocation(this.program, 'a_texture_position');

            this.buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
                0,      0,      0, 0,
                0,      EXTENT, 0, 1,
                EXTENT, 0,      1, 0,
                EXTENT, EXTENT, 1, 1
            ]), gl.STATIC_DRAW);
        },

        render(gl, {tiles, getProjectionData}) {
            gl.useProgram(this.program);
            gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
            gl.enableVertexAttribArray(this.positionLocation);
            gl.vertexAttribPointer(this.positionLocation, 2, gl.FLOAT, false, 16, 0);
            gl.enableVertexAttribArray(this.texturePositionLocation);
            gl.vertexAttribPointer(this.texturePositionLocation, 2, gl.FLOAT, false, 16, 8);
            gl.uniform1i(this.imageLocation, 0);

            for (const tile of tiles) {
                if (tile.data.type !== 'raster') continue;
                gl.activeTexture(gl.TEXTURE0);
                tile.data.bindTexture();
                const projectionData = getProjectionData({tileID: tile.tileID});
                gl.uniformMatrix4fv(this.matrixLocation, false, projectionData.mainMatrix);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            }
        },

        onRemove(_map, gl) {
            gl.deleteBuffer(this.buffer);
            gl.deleteProgram(this.program);
        }
    };

    map.on('load', () => {
        map.addLayer(rasterLayer);
    });
</script>
</body>
</html>
