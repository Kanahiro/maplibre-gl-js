<!DOCTYPE html>
<html lang="en">
<head>
    <title>Use raster tiles in a custom layer</title>
    <meta property="og:description" content="Use raster tile textures on 3D objects without copying them." />
    <meta property="og:category" content="Raster & Imagery" />
    <meta property="og:created" content="2026-07-13" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../../dist/maplibre-gl.css" />

    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script type="module">
    import * as maplibregl from '../../dist/maplibre-gl-dev.mjs';

    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'raster-tiles': {
                    type: 'raster',
                    tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                    tileSize: 256,
                    attribution: '© OpenStreetMap contributors'
                }
            },
            layers: [{
                id: 'osm',
                type: 'raster',
                source: 'raster-tiles'
            }]
        },
        center: [7.5, 48],
        zoom: 4,
        pitch: 40,
        bearing: -20,
        canvasContextAttributes: {antialias: true}
    });

    const rasterLayer = {
        id: 'custom-raster',
        type: 'custom',
        source: 'raster-tiles',
        renderingMode: '3d',

        onAdd(_map, gl) {
            const vertexShader = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vertexShader, `#version 300 es
                uniform mat4 u_matrix;
                uniform vec2 u_center;
                uniform float u_size;
                out vec2 v_texture_position;
                out float v_shade;

                const vec3 corners[8] = vec3[8](
                    vec3(-0.5, -0.5, 0.0), vec3(0.5, -0.5, 0.0),
                    vec3(0.5, 0.5, 0.0), vec3(-0.5, 0.5, 0.0),
                    vec3(-0.5, -0.5, 1.0), vec3(0.5, -0.5, 1.0),
                    vec3(0.5, 0.5, 1.0), vec3(-0.5, 0.5, 1.0)
                );
                const int indices[36] = int[36](
                    0, 2, 1, 0, 3, 2,
                    4, 5, 6, 4, 6, 7,
                    0, 1, 5, 0, 5, 4,
                    1, 2, 6, 1, 6, 5,
                    2, 3, 7, 2, 7, 6,
                    3, 0, 4, 3, 4, 7
                );
                void main() {
                    vec3 position = corners[indices[gl_VertexID]];
                    mat2 rotation = mat2(0.707, 0.707, -0.707, 0.707);
                    vec2 xy = u_center + rotation * position.xy * u_size;
                    gl_Position = u_matrix * vec4(xy, position.z * u_size, 1.0);
                    int face = gl_VertexID / 6;
                    v_texture_position = face < 2 ? position.xy + 0.5 :
                        vec2((face == 2 || face == 4 ? position.x : position.y) + 0.5, 1.0 - position.z);
                    v_shade = face == 1 ? 1.0 : (face == 3 || face == 4 ? 0.72 : 0.85);
                }
            `);
            gl.compileShader(vertexShader);

            const fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fragmentShader, `#version 300 es
                precision highp float;
                uniform sampler2D u_image;
                in vec2 v_texture_position;
                in float v_shade;
                out vec4 fragColor;

                void main() {
                    vec4 color = texture(u_image, v_texture_position);
                    fragColor = vec4(color.rgb * v_shade, color.a);
                }
            `);
            gl.compileShader(fragmentShader);

            this.program = gl.createProgram();
            gl.attachShader(this.program, vertexShader);
            gl.attachShader(this.program, fragmentShader);
            gl.linkProgram(this.program);
            gl.deleteShader(vertexShader);
            gl.deleteShader(fragmentShader);

            this.matrixLocation = gl.getUniformLocation(this.program, 'u_matrix');
            this.centerLocation = gl.getUniformLocation(this.program, 'u_center');
            this.sizeLocation = gl.getUniformLocation(this.program, 'u_size');
            this.imageLocation = gl.getUniformLocation(this.program, 'u_image');
        },

        render(gl, {tiles, defaultProjectionData}) {
            const rasterTiles = tiles.filter((tile) => tile.data.type === 'raster');
            if (rasterTiles.length === 0) return;
            const zoom = Math.max(...rasterTiles.map((tile) => tile.tileID.canonical.z));

            gl.useProgram(this.program);
            gl.uniformMatrix4fv(this.matrixLocation, false, defaultProjectionData.mainMatrix);
            gl.uniform1i(this.imageLocation, 0);
            gl.activeTexture(gl.TEXTURE0);

            for (const tile of rasterTiles) {
                if (tile.tileID.canonical.z !== zoom) continue;
                tile.data.bindTexture();
                const {canonical, wrap = 0} = tile.tileID;
                const tileSize = 1 / (2 ** canonical.z);
                gl.uniform2f(
                    this.centerLocation,
                    (canonical.x + 0.5) * tileSize + wrap,
                    (canonical.y + 0.5) * tileSize
                );
                gl.uniform1f(this.sizeLocation, tileSize * 0.2);
                gl.drawArrays(gl.TRIANGLES, 0, 36);
            }
        },

        onRemove(_map, gl) {
            gl.deleteProgram(this.program);
        }
    };

    map.on('load', () => {
        map.addLayer(rasterLayer);
    });
</script>
</body>
</html>
